apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nyambot-opensearch-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: nyambot
    app.kubernetes.io/environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/NyamBot/backend.git
    targetRevision: main
    path: infra/k8s/opensearch/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: nyambot-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
