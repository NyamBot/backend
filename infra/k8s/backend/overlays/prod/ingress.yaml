apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nyambot-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: nyambot.kro.kr
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nyambot-backend
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: nyambot-backend
                port:
                  name: http
