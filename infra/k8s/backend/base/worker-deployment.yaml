apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyambot-chat-message-worker
  labels:
    app.kubernetes.io/name: nyambot-chat-message-worker
    app.kubernetes.io/part-of: nyambot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nyambot-chat-message-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nyambot-chat-message-worker
        app.kubernetes.io/part-of: nyambot
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/nyambot/backend:prod
          imagePullPolicy: Always
          command: ["python", "-m", "app.workers.chat_message_worker"]
          envFrom:
            - configMapRef:
                name: nyambot-backend-config
            - secretRef:
                name: nyambot-backend-secret
                optional: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
