apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyambot-backend
  labels:
    app.kubernetes.io/name: nyambot-backend
    app.kubernetes.io/part-of: nyambot
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nyambot-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nyambot-backend
        app.kubernetes.io/part-of: nyambot
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/nyambot/backend:prod
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: nyambot-backend-config
            - secretRef:
                name: nyambot-backend-secret
                optional: false
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
