apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-ism-setup
  labels:
    app.kubernetes.io/name: opensearch-ism-setup
    app.kubernetes.io/part-of: nyambot
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch-ism-setup
        app.kubernetes.io/part-of: nyambot
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent
          env:
            - name: OPENSEARCH_URL
              value: http://opensearch:9200
          command:
            - /bin/sh
            - -ec
            - |
              until curl -fsS "$OPENSEARCH_URL/_cluster/health" >/dev/null; do
                echo "waiting for OpenSearch..."
                sleep 5
              done

              curl -fsS -X PUT "$OPENSEARCH_URL/_plugins/_ism/policies/nyambot-app-log-retention" \
                -H "Content-Type: application/json" \
                -d '{
                  "policy": {
                    "description": "Delete NyamBot application logs after 14 days",
                    "default_state": "hot",
                    "states": [
                      {
                        "name": "hot",
                        "actions": [],
                        "transitions": [
                          {
                            "state_name": "delete",
                            "conditions": {
                              "min_index_age": "14d"
                            }
                          }
                        ]
                      },
                      {
                        "name": "delete",
                        "actions": [
                          {
                            "delete": {}
                          }
                        ],
                        "transitions": []
                      }
                    ],
                    "ism_template": [
                      {
                        "index_patterns": ["nyambot-app-log-*"],
                        "priority": 100
                      }
                    ]
                  }
                }'

              curl -fsS -X PUT "$OPENSEARCH_URL/_plugins/_ism/policies/nyambot-chat-retention" \
                -H "Content-Type: application/json" \
                -d '{
                  "policy": {
                    "description": "Delete NyamBot chat message indices after 180 days",
                    "default_state": "hot",
                    "states": [
                      {
                        "name": "hot",
                        "actions": [],
                        "transitions": [
                          {
                            "state_name": "delete",
                            "conditions": {
                              "min_index_age": "180d"
                            }
                          }
                        ]
                      },
                      {
                        "name": "delete",
                        "actions": [
                          {
                            "delete": {}
                          }
                        ],
                        "transitions": []
                      }
                    ],
                    "ism_template": [
                      {
                        "index_patterns": ["nyambot-chat-*"],
                        "priority": 100
                      }
                    ]
                  }
                }'

              echo "OpenSearch ISM policies applied."
