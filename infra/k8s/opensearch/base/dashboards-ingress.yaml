apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opensearch-dashboards
  labels:
    app.kubernetes.io/name: opensearch-dashboards
    app.kubernetes.io/part-of: nyambot
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: opensearch-dashboards-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "OpenSearch Dashboards"
spec:
  ingressClassName: nginx
  rules:
    - host: opensearch.nyambot.kro.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opensearch-dashboards
                port:
                  name: http
