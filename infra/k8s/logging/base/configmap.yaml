apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 5
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020

    [INPUT]
        Name tail
        Path /var/log/containers/*_nyambot-prod_*.log
        Exclude_Path /var/log/containers/*fluent-bit*.log
        Parser cri
        Tag kube.var.log.containers.*
        DB /buffers/flb_kube.db
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
        Read_from_Head Off
        Refresh_Interval 10

    [FILTER]
        Name kubernetes
        Match kube.var.log.containers.*
        Kube_Tag_Prefix kube.var.log.containers.
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

    [OUTPUT]
        Name opensearch
        Match kube.var.log.containers.*
        Host opensearch.nyambot-prod.svc.cluster.local
        Port 9200
        Logstash_Format On
        Logstash_Prefix nyambot-app-log
        Logstash_DateFormat %Y-%m-%d
        Time_Key @timestamp
        Suppress_Type_Name On
        Replace_Dots On
        Retry_Limit False
