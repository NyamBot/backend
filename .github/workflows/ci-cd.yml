name: Backend CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-db.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-db.txt

      - name: Compile application
        run: python -m compileall app

      - name: Import FastAPI app
        env:
          APP_ENV: ci
          DATABASE_URL: sqlite:///./data/nyambot-ci.db
          CHAT_MESSAGE_BACKEND: sqlite
          HUGGINGFACE_RERANK_ENABLED: "false"
        run: python -c "from app.main import app; print(app.title)"

  docker:
    name: Docker build and publish
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/nyambot/backend" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=prod,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update production manifest image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" infra/k8s/backend/overlays/prod/kustomization.yaml
          if git diff --quiet -- infra/k8s/backend/overlays/prod/kustomization.yaml; then
            echo "Production manifest already uses ${IMAGE_TAG}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/backend/overlays/prod/kustomization.yaml
          git commit -m "chore(deploy): backend ${IMAGE_TAG} [skip ci]"
          git push
