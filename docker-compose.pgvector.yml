services:
  pgvector:
    build:
      context: ./infra/pgvector
    image: nyambot-pgvector:latest
    container_name: nyambot-pgvector
    environment:
      POSTGRES_DB: nyambot
      POSTGRES_USER: nyambot
      POSTGRES_PASSWORD: nyambot
    ports:
      - "15432:5432"
    volumes:
      - nyambot-pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyambot -d nyambot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nyambot-pgvector-data:
    name: nyambot-pgvector-data
