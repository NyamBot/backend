services:
  pgvector:
    build:
      context: ./infra/pgvector
    image: tasteforge-ai-pgvector:latest
    container_name: tasteforge-ai-pgvector
    environment:
      POSTGRES_DB: tasteforge
      POSTGRES_USER: tasteforge
      POSTGRES_PASSWORD: tasteforge
    ports:
      - "15432:5432"
    volumes:
      - tasteforge-ai-pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasteforge -d tasteforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tasteforge-ai-pgvector-data:
    name: tasteforge-ai-pgvector-data
