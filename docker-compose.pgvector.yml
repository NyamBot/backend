services:
  pgvector:
    build:
      context: ./infra/pgvector
    image: nyambot-pgvector:latest
    container_name: nyambot-pgvector
    environment:
      POSTGRES_DB: nyambot
      POSTGRES_USER: nyambot
      POSTGRES_PASSWORD: nyambot
    ports:
      - "15432:5432"
    volumes:
      - nyambot-pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyambot -d nyambot"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: nyambot-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "NyamBot-local-dev-123!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9300:9200"
      - "9600:9600"
    volumes:
      - nyambot-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  nyambot-pgvector-data:
    name: nyambot-pgvector-data
  nyambot-opensearch-data:
    name: nyambot-opensearch-data
