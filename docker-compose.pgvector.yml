name: nyambot_backend

services:
  backend:
    build:
      context: .
    container_name: nyambot-backend
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql://nyambot:nyambot@pgvector:5432/nyambot
      OPENSEARCH_URL: http://opensearch:9200
      CHAT_MESSAGE_QUEUE_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: nyambot
      RABBITMQ_PASSWORD: nyambot
    ports:
      - "8000:8000"
    depends_on:
      pgvector:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  chat-message-worker:
    build:
      context: .
    container_name: nyambot-chat-message-worker
    command: ["python", "-m", "app.workers.chat_message_worker"]
    healthcheck:
      disable: true
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql://nyambot:nyambot@pgvector:5432/nyambot
      OPENSEARCH_URL: http://opensearch:9200
      CHAT_MESSAGE_QUEUE_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: nyambot
      RABBITMQ_PASSWORD: nyambot
    depends_on:
      pgvector:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: nyambot-pgvector
    environment:
      POSTGRES_DB: nyambot
      POSTGRES_USER: nyambot
      POSTGRES_PASSWORD: nyambot
    ports:
      - "15432:5432"
    volumes:
      - nyambot-pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyambot -d nyambot"]
      interval: 5s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: nyambot-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "NyamBot-local-dev-123!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9300:9200"
      - "9600:9600"
    volumes:
      - nyambot-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nyambot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nyambot
      RABBITMQ_DEFAULT_PASS: nyambot
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  nyambot-pgvector-data:
    name: nyambot-pgvector-data
  nyambot-opensearch-data:
    name: nyambot-opensearch-data
